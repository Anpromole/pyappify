# Receive MediaSpider Build Trigger
name: Receive MediaSpider Build

on:
  repository_dispatch:
    types: [build-medispider]

jobs:
  build-medispider:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: 检出 MediaSpider 代码
        uses: actions/checkout@v4
        with:
          repository: Anpromole/MediaSpider
          path: medispider-src

      - name: 显示构建信息
        run: |
          Write-Host "=== 开始构建 MediaSpider ==="
          Write-Host "版本：${{ github.event.client_payload.version }}"
          Write-Host "================================"

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 显示环境信息
        run: |
          Write-Host "=== Environment Info ==="
          Write-Host "Node: $(node --version)"
          Write-Host "npm: $(npm --version)"
          Write-Host "Rust: $(rustc --version)"
          Write-Host "========================"

      - name: 安装依赖
        run: |
          Write-Host "当前目录：$(Get-Location)"
          Get-ChildItem
          npm install --legacy-peer-deps

      - name: 创建 dist 目录
        run: |
          New-Item -ItemType Directory -Force -Path "dist"
          @"
          <!DOCTYPE html>
          <html>
          <head><meta charset='UTF-8'><title>pyappify</title></head>
          <body><h1>pyappify</h1><p>MediaSpider Package Builder</p></body>
          </html>
          "@ | Out-File -FilePath "dist/index.html" -Encoding utf8
          Write-Host "dist 目录创建完成"

      - name: 编译 pyappify
        run: |
          Write-Host "Building pyappify..."
          npx tauri build --verbose
        env:
          RUST_BACKTRACE: 1

      - name: 准备打包文件
        run: |
          if (Test-Path "src-tauri/target/release/pyappify.exe") {
            Copy-Item "src-tauri/target/release/pyappify.exe" .
            Write-Host "pyappify.exe 已复制"
          } else {
            Write-Host "pyappify.exe not found, searching..."
            Get-ChildItem -Recurse -Filter "pyappify.exe" | ForEach-Object { Write-Host $_.FullName }
          }
          Copy-Item -Recurse "medispider-src/icons" .
          Copy-Item "medispider-src/pyappify.yml" .
          Copy-Item "medispider-src/requirements.txt" .
          Copy-Item "medispider-src/main.py" .
          Copy-Item "medispider-src/config.py" .
          Copy-Item "medispider-src/threads.py" .
          Copy-Item "medispider-src/widgets.py" .
          Copy-Item -Recurse "medispider-src/spider"
          Write-Host "文件已复制"

      - name: 创建 Windows 安装包
        run: |
          Compress-Archive -Path @("pyappify.exe","pyappify.yml","icons","requirements.txt","main.py","config.py","threads.py","widgets.py","spider") -DestinationPath "MediaSpider-${{ github.event.client_payload.version }}-windows.zip"
          Write-Host "压缩包已创建"

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.client_payload.version }}
          name: MediaSpider v${{ github.event.client_payload.version }}
          files: MediaSpider-${{ github.event.client_payload.version }}-windows.zip
          generate_release_notes: true
          token: ${{ secrets.PYAPPIFY_PAT }}
